<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vektor Flow Shared Runtime Rect Demo</title>
  <link rel="stylesheet" href="./vf-frame.css">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: #f8f4dc;
      font: 14px/1.4 Consolas, "Cascadia Mono", monospace;
    }

    #layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .vf-shared-demo-shell {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 260px;
      overflow: hidden;
      background: transparent;
      pointer-events: auto;
    }

    .vf-shared-runtime-frame .vf-frame__body {
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    .vf-shared-demo-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      background: transparent;
    }

    .vf-shared-demo-canvas.dragging {
      cursor: grabbing;
    }

  </style>
</head>
<body>
  <div id="layer"></div>
  <script src="./vf-frame.js"></script>
  <script src="./vf-shared-runtime.js"></script>
  <script src="./vf-vkf-ui-runtime.js"></script>
  <script src="./vf-gpu-runtime.js"></script>
  <script src="./vf-wasm-demo-contract.js"></script>
  <script src="./vf-shared-rect-program.js"></script>
  <script src="./vf-shared-rect-demo.js"></script>
</body>
</html>

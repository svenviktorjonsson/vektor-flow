<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Donut Hit Test</title>
  <script src="./vf-frame.js"></script>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #layer { position: fixed; inset: 0; pointer-events: none; }
    #ring {
      position: absolute;
      width: 400px;
      height: 400px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 30%),
        radial-gradient(circle at 50% 50%, rgba(255,184,92,.95) 38%, rgba(246,110,35,.95) 62%, rgba(120,45,12,.95) 100%);
      box-shadow: 0 10px 26px rgba(0,0,0,.38);
      pointer-events: none;
      -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 92px, #000 93px 100%);
      mask: radial-gradient(circle at 50% 50%, transparent 0 92px, #000 93px 100%);
    }
    #hint {
      position: fixed;
      left: 16px;
      top: 16px;
      color: #f2f2f2;
      font: 600 16px/1.35 Segoe UI, system-ui, sans-serif;
      text-shadow: 0 2px 8px rgba(0,0,0,.7);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="layer">
    <div id="ring" aria-hidden="true"></div>
  </div>
  <div id="hint">Donut hit-test: center hole should be click-through</div>
  <script>
    (function () {
      var layer = document.getElementById("layer");
      var ring = document.getElementById("ring");
      function ringRegions() {
        var r = ring.getBoundingClientRect();
        var cx = (r.left + r.right) * 0.5;
        var cy = (r.top + r.bottom) * 0.5;
        var outer = 200;
        var inner = 92;
        var step = 3;
        var out = [];
        for (var y = -outer; y <= outer; y += step) {
          var yy = y * y;
          var xo = Math.sqrt(Math.max(0, outer * outer - yy));
          var xi = yy < inner * inner ? Math.sqrt(Math.max(0, inner * inner - yy)) : -1;
          if (xo <= 0) continue;
          var top = Math.floor(cy + y);
          var bottom = top + step;
          if (xi > 0) {
            out.push({ left: Math.floor(cx - xo), top: top, right: Math.floor(cx - xi), bottom: bottom });
            out.push({ left: Math.ceil(cx + xi), top: top, right: Math.ceil(cx + xo), bottom: bottom });
          } else {
            out.push({ left: Math.floor(cx - xo), top: top, right: Math.ceil(cx + xo), bottom: bottom });
          }
        }
        return out;
      }
      function post() {
        if (typeof VfFrame === "undefined" || typeof VfFrame.postNativeHostLayout !== "function") return;
        VfFrame.postNativeHostLayout(layer, {
          stageAlpha: 0,
          contentHidden: false,
          hitRegions: ringRegions()
        });
      }
      post();
      window.addEventListener("resize", post);
      setInterval(post, 150);
    })();
  </script>
</body>
</html>
